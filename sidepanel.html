<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawTalk Talk Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>ClawTalk</h1>
        <button id="settings" class="link-button" type="button">Settings</button>
      </header>

      <section class="status">
        <div class="indicator" id="mic-indicator" aria-hidden="true"></div>
        <div>
          <div class="status-label">Talk</div>
          <div id="status-text">Disconnected</div>
        </div>
      </section>

      <section class="controls">
        <button id="connect-toggle" class="talk-button" type="button">Connect</button>
        <button id="talk-toggle" class="talk-button" type="button" disabled>Talk</button>
      </section>

      <section class="toggle-row">
        <span>Speaking</span>
        <label class="switch" aria-label="Speaking">
          <input id="speaking-toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="meta">
        <div id="connection-text">Gateway: 127.0.0.1:18789</div>
        <div id="mode-text">Mode: Live</div>
        <div class="session-row">
          <span>Session</span>
          <div class="session-controls">
            <select id="session-select" aria-label="Session"></select>
            <button id="session-delete" class="session-delete" type="button" title="Delete session">Delete</button>
          </div>
        </div>
      </section>

      <section class="logs">
        <div class="logs-header">
          <span>CHAT</span>
          <span id="chat-count">0</span>
        </div>
        <div id="chat-list" class="log-list chat-list" aria-live="polite"></div>

        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
          <button id="chat-send" class="talk-button chat-send" type="button">Send</button>
        </div>
      </section>

      <section class="logs">
        <div class="logs-header">
          <span>Logs</span>
          <span id="log-count">0</span>
        </div>
        <div id="log-list" class="log-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
