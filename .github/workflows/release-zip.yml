name: Build release zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ZIP="ClawTalk-${TAG}.zip"

          # Create a zip suitable for "Load unpacked".
          # Exclude git metadata and CI files.
          zip -r "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/.DS_Store" \
            -x "**/Thumbs.db"

          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
